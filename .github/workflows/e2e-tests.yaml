name: "e2e-tests"

on:
  push:
    paths:
    - e2e-tests/**
    - shared/dockerfiles/e2e-tests/**
  workflow_run:
    workflows:
    - "rust cli build"
    - "rust-gqlcodegen"
    - "rust-libgql"
    - "typescript gql-codegen"
    - "typescript gql-client"
    types: 
    - completed

jobs:
  docker:
    runs-on: ubuntu-latest
    needs:
    - build_cli
    - build_gqlcodegen
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Docker compose up
      env:
        GRAPHQL_BASE_IMAGE: vladimirdev635/gql:${{ github.ref_name }}
      run: docker compose -f ./e2e-tests/docker-compose.yaml up
    - name: Run typescript-client tests
      run: docker compose exec typescript-client bun start
      continue-on-error: true
    - name: Docker compose down
      if: always()
      run: docker-compose -f ./e2e-tests/docker-compose.yaml down
